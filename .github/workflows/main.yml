name: Ubuntu Plus X-Core Build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🧹 Clean Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune -a -f

      - name: 🛠️ Setup Tools
        run: sudo apt-get update && sudo apt-get install -y xorriso squashfs-tools wget curl p7zip-full

      - name: 💿 ISO Download & Extract
        run: |
          curl -L -o base.iso https://mirrors.kernel.org/ubuntu-releases/24.04/ubuntu-24.04-desktop-amd64.iso
          mkdir -p x
          7z x base.iso -ox/ -y || true
          rm base.iso
          # تأمين الصلاحيات للفولدر x
          sudo chmod -R 777 x

      - name: 🏗️ Execute build.sh
        run: |
          chmod +x build.sh
          # تشغيل السكريبت اللي هيعدل جوه x
          sudo -E DEBIAN_FRONTEND=noninteractive ./build.sh

      - name: 📦 Final Pack
        run: |
          # تجميع الـ ISO من الفولدر x المعدل
          sudo xorriso -as mkisofs -r -V "Ubuntu-Plus-X" -o Ubuntu-Plus-Final.iso x/

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: Ubuntu-Plus-ISO
          path: Ubuntu-Plus-Final.iso
          retention-days: 90
